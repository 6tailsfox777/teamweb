<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第5組 - 智慧 IoT 監控系統</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Segoe UI", "Noto Sans TC", Arial, sans-serif;
            background: radial-gradient(circle at top left, #dbeafe 0%, #eff6ff 28%, #f8fafc 100%);
            color: #1f2937;
            min-height: 100vh;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle at 20% 20%, rgba(59, 130, 246, 0.14), transparent 24%),
                              radial-gradient(circle at 80% 10%, rgba(14, 165, 233, 0.12), transparent 20%),
                              radial-gradient(circle at 50% 90%, rgba(16, 185, 129, 0.1), transparent 18%);
            pointer-events: none;
        }

        .container {
            max-width: 1120px;
            margin: 0 auto;
            padding: 48px 24px 72px;
        }

        .hero {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border-radius: 28px;
            padding: 40px;
            box-shadow: 0 24px 50px rgba(15, 23, 42, 0.18);
            margin-bottom: 28px;
            position: relative;
            overflow: hidden;
        }

        .hero::after {
            content: "";
            position: absolute;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 50%;
            top: -40px;
            right: -40px;
        }

        .hero h1 {
            font-size: clamp(2rem, 3.2vw, 3.4rem);
            line-height: 1.05;
            margin-bottom: 16px;
        }

        .hero p {
            color: rgba(241, 245, 249, 0.92);
            line-height: 1.75;
            max-width: 820px;
            font-size: 1rem;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1.3fr 0.95fr;
            gap: 24px;
        }

        .card {
            background: rgba(255, 255, 255, 0.92);
            border-radius: 24px;
            padding: 28px;
            box-shadow: 0 22px 48px rgba(15, 23, 42, 0.08);
            border: 1px solid rgba(148, 163, 184, 0.16);
            backdrop-filter: blur(10px);
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.15rem;
            font-weight: 800;
            margin-bottom: 18px;
        }

        .member-list {
            list-style: none;
            display: grid;
            gap: 14px;
        }

        .member-list a {
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: #111827;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 14px 18px;
            transition: transform 0.22s ease, border-color 0.22s ease, box-shadow 0.22s ease;
        }

        .member-list a:hover {
            background: #eff6ff;
            border-color: #93c5fd;
            transform: translateY(-2px);
            box-shadow: 0 18px 35px rgba(59, 130, 246, 0.08);
        }

        .member-list span:first-child {
            font-weight: 700;
        }

        .dashboard-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: linear-gradient(90deg, #93c5fd, #60a5fa);
            color: white;
            text-decoration: none;
            padding: 14px 22px;
            border-radius: 999px;
            font-weight: 700;
            margin-top: 12px;
            box-shadow: 0 14px 30px rgba(59, 130, 246, 0.18);
            transition: transform 0.16s ease, box-shadow 0.16s ease;
        }

        .dashboard-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 18px 35px rgba(59, 130, 246, 0.24);
        }

        .dashboard-note {
            color: #475569;
            margin-top: 12px;
            font-size: 0.96rem;
            line-height: 1.5;
        }

        .led-panel {
            text-align: center;
        }

        .led-status {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin: 18px auto 20px;
            padding: 12px 16px;
            background: #f1f5f9;
            border-radius: 999px;
            color: #475569;
            font-size: 0.98rem;
            border: 1px solid #e2e8f0;
        }

        .led-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #94a3b8;
            display: inline-block;
            box-shadow: inset 0 0 0 2px rgba(59, 130, 246, 0.18);
        }

        .btn-row {
            display: flex;
            justify-content: center;
            gap: 14px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        button {
            border: none;
            cursor: pointer;
            padding: 14px 24px;
            border-radius: 999px;
            font-size: 0.98rem;
            font-weight: 700;
            transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 28px rgba(15, 23, 42, 0.14);
        }

        .btn-on {
            background: linear-gradient(90deg, #16a34a, #22c55e);
            color: white;
        }

        .btn-off {
            background: linear-gradient(90deg, #dc2626, #f97316);
            color: white;
        }

        @media (max-width: 900px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }

            .hero {
                padding: 30px 26px;
            }

            .card {
                padding: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <section class="hero">
            <h1>第5組：智慧盆栽澆水系統</h1>
            <p>這是一個透過 Node-RED 與實體 LED 控制結合的 IoT 監控平台，提供組員個人網站入口與即時儀表板連結。</p>
        </section>

        <div class="dashboard-grid">
            <section class="card">
                <h3 class="section-title">👥 組員個人網站</h3>
                <ul class="member-list">
                    <li><a href="/member1/"><span>鐘祺翔</span><span>→</span></a></li>
                    <li><a href="/member2/"><span>廖烽均</span><span>→</span></a></li>
                    <li><a href="/member3/"><span>曾于庭</span><span>→</span></a></li>
                </ul>
            </section>

            <section class="card">
                <h3 class="section-title">📈 數據視覺化中樞</h3>
                <p class="dashboard-note">透過 Node-RED 儀表板檢視傳感器資料與控制流程。</p>
                <a class="dashboard-link" href="/nodered/ui/">點擊前往 Node-Red Dashboard</a>
            </section>
        </div>

        <section class="card" style="margin-top: 22px;">
            <div class="led-panel">
                <h3 class="section-title" style="justify-content: center;">💡 Pi 5 實體 LED 控制</h3>
                <div class="led-status">
                    <span class="led-dot" id="ledDot"></span>
                    <span id="ledStatusText">等待指令...</span>
                </div>
                <div class="btn-row">
                    <button class="btn-on" onclick="sendLEDCommand('ON')">開啟 LED</button>
                    <button class="btn-off" onclick="sendLEDCommand('OFF')">關閉 LED</button>
                </div>
            </div>
        </section>
    </div>

    <script>
        const ledStatusText = document.getElementById('ledStatusText');
        const ledDot = document.getElementById('ledDot');

        function updateLedUI(status) {
            const isOn = status === 'ON';
            ledStatusText.textContent = isOn ? 'LED 目前為 ON' : 'LED 目前為 OFF';
            ledDot.style.background = isOn ? '#22c55e' : '#ef4444';
        }

        function sendLEDCommand(status) {
            const formData = new FormData();
            formData.append('status', status);
            formData.append('csrfmiddlewaretoken', '{{ csrf_token }}');

            ledStatusText.textContent = '指令送出中...';
            ledDot.style.background = '#fbbf24';

            fetch('/control-led/', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.result === 'success') {
                    updateLedUI(data.status);
                } else {
                    ledStatusText.textContent = '控制失敗';
                    ledDot.style.background = '#ef4444';
                    alert('控制失敗: ' + (data.message || '請稍後再試'));
                }
            })
            .catch(() => {
                ledStatusText.textContent = '連線失敗';
                ledDot.style.background = '#ef4444';
                alert('無法連線到控制 API，請稍後再試。');
            });
        }
    </script>
</body>
</html>
