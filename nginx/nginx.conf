server {
    listen 80;
    server_name localhost;

    # 🌟 1. 你 (組員 A) 的個人網站 (用 8002)
    location /member1/ {
        proxy_pass http://my_personal_web:8002/; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 🌟 2. 組員 B 的個人網站 (自動對接 Docker 服務)
    location /member2/ {
        # 💡 這裡直接改成 docker-compose 裡定義的服務名稱（移除後面的 -1）
        proxy_pass http://yuntech_member2_personal:8001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 🌟 3. 組員 C 的個人網站 (本機跑 8008)
    location /member3/ {
        # 💡 直接改用主機實體 IP，最乾淨暴力、最不卡關
        proxy_pass http://172.20.10.7:8008/;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 🌟 4. 核心大專題網站 (Django 容器)
    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 讓 Nginx 統一控管 Node-RED
    location /nodered/ {
        proxy_pass http://yuntech_plant_nodered:1880/; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}